site_name: 嵌入式 Linux 知识体系（V2025）
site_url: https://xiaohong0925.github.io/Embedded_Knowledge_System_V2026/
repo_url: https://github.com/xiaohong0925/Embedded_Knowledge_System_V2026
repo_name: GitHub

theme:
  name: material
  language: zh
  logo: images/logo.png              # 站点 Logo（可选，没有就注释掉）
  favicon: images/favicon.ico        # 站点图标（可选）
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换亮色模式
  features:
    - navigation.tabs                # 顶部标签导航
    - navigation.sections            # 左侧目录可折叠
    - navigation.expand              # 默认展开目录
    - navigation.top                 # 返回顶部按钮
    - navigation.path                # 面包屑导航
    - search.suggest                 # 搜索建议
    - search.highlight               # 搜索结果高亮
    - search.share                   # 分享搜索结果
    - content.code.copy              # 代码块复制按钮
    - content.code.annotate          # 代码注释
    - content.action.edit            # 编辑按钮（跳转到 GitHub 编辑）
    - content.action.view            # 查看源码按钮

plugins:
  - search:
      lang: zh

extra_css:
  - stylesheets/extra.css            # 自定义颜色、字体等样式

extra_javascript:
  - javascripts/mathjax.js           # 如需数学公式支持（可选）

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true
  - admonition                       # 提示框 !!! note
  - pymdownx.details                 # 可折叠内容 ???
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.mark                    # 文本高亮 ==高亮== 
  - pymdownx.caret                   # 上标 ^上标^
  - pymdownx.tilde                   # 下标 ~下标~
  - attr_list                        # 给图片/链接加属性
  - md_in_html                       # HTML 标签内支持 Markdown

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/xiaohong0925
  version:
    provider: mike                    # 多版本支持（可选）

