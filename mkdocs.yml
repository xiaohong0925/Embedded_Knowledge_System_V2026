site_name: 嵌入式 Linux 知识体系 V2026
site_url: https://xiaohong0925.github.io/Embedded_Knowledge_System_V2026/
repo_url: https://github.com/xiaohong0925/Embedded_Knowledge_System_V2026
repo_name: GitHub
copyright: Copyright &copy; 2026 登月者0432
theme:
  name: material
#  custom_dir: overrides
  language: zh
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换暗色模式
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: 切换亮色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  font:
    text: Roboto
    code: Roboto Mono
plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\u200b\-]'
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
markdown_extensions:
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - attr_list
  - md_in_html
  - meta
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.betterem
  - pymdownx.caret          # 支持 ^上标^ 写法
  - pymdownx.mark
  - pymdownx.tilde
  - footnotes               # 核心：启用脚注
  - footnotes
  - def_list
  - abbr

extra:
  generator: false
